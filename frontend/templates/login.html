{% extends "base.html" %}

{% block title %}Sign In - InternMatch{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 20px 0;">
    <div class="glass-card" style="width: 100%; max-width: 450px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-lock" style="font-size: 36px; color: var(--primary); margin-bottom: 12px; filter: drop-shadow(0 0 10px var(--primary-glow));"></i>
            <h2 class="section-title" style="border: none; padding: 0; text-align: center; display: inline-block; margin-bottom: 6px;">Welcome Back</h2>
            <p style="color: var(--text-secondary); font-size: 14px;">Sign in to access your dashboard</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div style="position: relative;">
                    <i class="fa-regular fa-envelope" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                    <input type="email" id="email" name="email" class="form-control" placeholder="name@domain.com" required style="padding-left: 45px;">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
                </div>
                <div style="position: relative;">
                    <i class="fa-solid fa-key" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required style="padding-left: 45px;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 14px; margin-bottom: 20px;">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div style="text-align: center; font-size: 14px; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--secondary); font-weight: 600;">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
