{% extends "base.html" %}

{% block title %}Create Account - InternMatch{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; padding: 20px 0;">
    <div class="glass-card" style="width: 100%; max-width: 600px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-user-plus" style="font-size: 36px; color: var(--primary); margin-bottom: 12px; filter: drop-shadow(0 0 10px var(--primary-glow));"></i>
            <h2 class="section-title" style="border: none; padding: 0; text-align: center; display: inline-block; margin-bottom: 6px;">Create Account</h2>
            <p style="color: var(--text-secondary); font-size: 14px;">Select your role to register on the platform</p>
        </div>

        <form action="{{ url_for('auth.register') }}" method="POST">
            <!-- Role Toggler Radio Cards -->
            <div class="role-selector">
                <div class="role-option">
                    <input type="radio" id="role-student" name="role" value="student" checked>
                    <label for="role-student" style="cursor: pointer; width: 100%; height: 100%; display: block;">
                        <i class="fa-solid fa-graduation-cap" style="font-size: 24px; color: var(--secondary); margin-bottom: 8px;"></i>
                        <div class="role-title">Student</div>
                        <div class="role-desc">Find matching internships and track applications</div>
                    </label>
                </div>
                
                <div class="role-option">
                    <input type="radio" id="role-company" name="role" value="company">
                    <label for="role-company" style="cursor: pointer; width: 100%; height: 100%; display: block;">
                        <i class="fa-solid fa-building" style="font-size: 24px; color: var(--primary); margin-bottom: 8px;"></i>
                        <div class="role-title">Company</div>
                        <div class="role-desc">Post jobs and manage candidates</div>
                    </label>
                </div>
            </div>

            <!-- General Fields -->
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <div style="position: relative;">
                    <i class="fa-regular fa-user" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                    <input type="text" id="username" name="username" class="form-control" placeholder="john_doe" required style="padding-left: 45px;">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div style="position: relative;">
                    <i class="fa-regular fa-envelope" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                    <input type="email" id="email" name="email" class="form-control" placeholder="john@student.edu" required style="padding-left: 45px;">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-key" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required style="padding-left: 45px;">
                </div>
            </div>

            <hr style="border: 0; height: 1px; background: var(--border-glass); margin: 30px 0;">

            <!-- Student-Specific Section -->
            <div id="student-fields-section">
                <h3 class="section-title" style="font-size: 18px; margin-bottom: 16px;">Student Profile Information</h3>
                
                <!-- Dynamic Skills tag input -->
                <div class="form-group">
                    <label class="form-label" for="skills-input-raw">Your Technical Skills</label>
                    <input type="text" id="skills-input-raw" class="form-control" placeholder="Type a skill (e.g. Python, CSS) and press Enter or comma">
                    <div class="tags-list" id="skills-tags-container" style="margin-top: 10px;"></div>
                    <!-- Hidden field to send final values with post request -->
                    <input type="hidden" id="hidden-skills-value" name="skills" value="">
                </div>

                <div class="form-group">
                    <label class="form-label" for="resume_link">Resume Link (Drive, Github, etc.)</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-link" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                        <input type="url" id="resume_link" name="resume_link" class="form-control" placeholder="https://drive.google.com/.../resume.pdf" style="padding-left: 45px;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="experience">Past Experience Details</label>
                    <textarea id="experience" name="experience" class="form-control" placeholder="Detail any hackathons, open-source work, or previous jobs..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="bio">Short Biography</label>
                    <textarea id="bio" name="bio" class="form-control" placeholder="Brief pitch about yourself, interests, and career goals..."></textarea>
                </div>
            </div>

            <!-- Company-Specific Section -->
            <div id="company-fields-section" style="display: none;">
                <h3 class="section-title" style="font-size: 18px; margin-bottom: 16px;">Company Details</h3>

                <div class="form-group">
                    <label class="form-label" for="company_name">Company Name</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-building" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                        <input type="text" id="company_name" name="company_name" class="form-control" placeholder="Apex Technology Solutions" style="padding-left: 45px;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="company_website">Company Website</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-globe" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                        <input type="url" id="company_website" name="company_website" class="form-control" placeholder="https://apextech.example.com" style="padding-left: 45px;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="company_description">Company Overview</label>
                    <textarea id="company_description" name="company_description" class="form-control" placeholder="Tell students about your company's mission, workspace, and core focus..."></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 14px; margin-top: 20px;">
                <i class="fa-solid fa-user-plus"></i> Register Account
            </button>
        </form>

        <div style="text-align: center; font-size: 14px; color: var(--text-secondary); margin-top: 24px;">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--secondary); font-weight: 600;">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
